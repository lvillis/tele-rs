[workspace]
members = [
    "crates/tele",
    "crates/tele-macros",
]
default-members = ["crates/tele"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "MIT"
repository = "https://github.com/lvillis/tele-rs"
homepage = "https://github.com/lvillis/tele-rs"

[workspace.dependencies]
axum = { version = "0.8.8", default-features = false, features = ["http1", "tokio"] }
bytes = "1.11.1"
futures-core = "0.3.31"
http = "1.4.0"
proc-macro-crate = "3.4.0"
proc-macro2 = "1.0.106"
quote = "1.0.44"
redis = { version = "1.0.4", default-features = false, features = ["tokio-comp"] }
reqx = { version = "0.1.22", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
syn = { version = "2.0.117", features = ["full"] }
thiserror = "2.0.18"
tokio = "1.49.0"
tokio-postgres = "0.7.16"
trybuild = "1.0.116"
url = "2.5.8"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
panic = "deny"
unwrap_used = "deny"
expect_used = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"

[workspace.metadata.release]
allow-branch = ["main"]
shared-version = true
consolidate-commits = true
dependent-version = "upgrade"
tag-name = "v{{version}}"
tag-message = "chore(release): v{{version}}"
pre-release-commit-message = "chore(release): v{{version}}"
push-remote = "origin"
